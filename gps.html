<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Dashboard Full Screen GPS + Nhiệt độ vị trí hiện tại</title>
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://tile.openstreetmap.org">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{
  --bg:#050a10; --panel:rgba(10,18,28,.70); --panel2:rgba(8,14,22,.82);
  --text:#eef8ff; --muted:#97aec2; --accent:#35b6ff; --ok:#49d47c; --amber:#ffc857; --danger:#ff6e6e;
}
body.day{
  --bg:#dfeaf5; --panel:rgba(240,246,251,.80); --panel2:rgba(224,236,246,.88);
  --text:#102231; --muted:#607b90; --accent:#0b84ff; --ok:#1ca154; --amber:#c98600; --danger:#df5b5b;
}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;font-family:Inter,Arial,sans-serif;background:var(--bg);overflow:hidden}
#app{position:fixed;inset:0}
#map{position:absolute;inset:0;z-index:1}
#overlay{position:absolute;inset:0;z-index:2;width:100%;height:100%;display:block;pointer-events:none}
#hud{
  position:absolute; inset:12px 12px auto 12px; z-index:3; display:flex; justify-content:space-between; gap:10px; pointer-events:none;
  opacity:1; transform:translateY(0); transition:opacity .35s ease, transform .35s ease;
}
#hud.auto-hidden{
  opacity:0; transform:translateY(-14px);
}
#leftTools, #rightTools{display:flex; gap:8px; pointer-events:auto}
.btn{
  border:none; border-radius:999px; padding:10px 14px; font-weight:800; cursor:pointer;
  background:var(--panel); color:var(--text); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.08);
}
.btn.primary{background:var(--accent); color:white}
#toast{
  position:absolute; left:12px; right:12px; bottom:12px; z-index:4;
  padding:12px 14px; border-radius:14px; background:var(--panel2); color:var(--muted);
  backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,.08); font-size:13px; line-height:1.4;
}
.hidden{display:none}
#map.race-hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <div id="map"></div>
  <canvas id="overlay" width="800" height="480"></canvas>

  <div id="hud">
    <div id="leftTools">
      <button id="gpsBtn" class="btn primary">Bật GPS</button>
      <button id="modeBtn" class="btn">Touring</button>
    </div>
    <div id="rightTools">
      <button id="bikeThemeBtn" class="btn">Ducati</button>
      <button id="lapBtn" class="btn">Lap</button>
      <button id="themeBtn" class="btn">Night</button>
      <button id="followBtn" class="btn">Follow</button>
    </div>
  </div>

  <div id="toast">Bấm <b>Bật GPS</b> để lấy vị trí thật, tốc độ thật đã lọc chống rung khi đứng yên, và nhiệt độ đúng tại nơi bạn đang đứng.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const toast = document.getElementById('toast');
const gpsBtn = document.getElementById('gpsBtn');
const modeBtn = document.getElementById('modeBtn');
const themeBtn = document.getElementById('themeBtn');
const followBtn = document.getElementById('followBtn');
const bikeThemeBtn = document.getElementById('bikeThemeBtn');
const lapBtn = document.getElementById('lapBtn');
const hud = document.getElementById('hud');
let hudHideTimer = null;

let mode = 'touring';
let follow = true;
let watchId = null;
let tempTimer = null;

const state = {
  lat: 21.028511,
  lng: 105.804817,
  speedKmh: 0,
  rawSpeedKmh: 0,
  speedSamples: [],
  heading: 0,
  accuracy: null,
  locationOk: false,
  sats: 0,
  lastTimestamp: null,
  lastLat: null,
  lastLng: null,
  temperature: null,
  weatherText: 'Đang chờ thời tiết...',
  rpm: 4200,
  gear: 1,
  overspeedShake: 0,
  trackMode: true,
  lapStart: null,
  lapCurrentMs: 0,
  lapBestMs: null,
  lapLastMs: null,
  bikeTheme: 'ducati'
};

function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

const map = L.map('map', { zoomControl:false, attributionControl:false }).setView([state.lat, state.lng], 15);
const base = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(map);
const routeLine = L.polyline([], { color:'#35b6ff', weight:6, opacity:0.85 }).addTo(map);
const marker = L.circleMarker([state.lat, state.lng], { radius:8, color:'#35b6ff', weight:3, fillColor:'#87dcff', fillOpacity:1 }).addTo(map);
const accuracyCircle = L.circle([state.lat, state.lng], { radius:0, color:'#35b6ff', weight:1, fillColor:'#35b6ff', fillOpacity:0.08 }).addTo(map);
const track = [];

function showHudTemporarily(customDelay){
  hud.classList.remove('auto-hidden');
  if(hudHideTimer) clearTimeout(hudHideTimer);
  const delay = customDelay || 7000;
  hudHideTimer = setTimeout(() => {
    hud.classList.add('auto-hidden');
  }, delay);
}

function wireHudActivity(){
  const wake = () => showHudTemporarily(7000);

  ['pointerdown','touchstart','mousemove'].forEach(evt => {
    document.addEventListener(evt, wake, { passive:true });
  });

  [gpsBtn, modeBtn, themeBtn, followBtn, bikeThemeBtn, lapBtn].forEach(btn => {
    btn.addEventListener('click', () => showHudTemporarily(9000));
  });
}

function setToast(msg){ toast.innerHTML = msg; }

function haversineKm(lat1, lon1, lat2, lon2){
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(a));
}

function getSpeedThresholdByAccuracy(acc){
  if(acc == null) return 3.5;
  if(acc <= 8) return 1.8;
  if(acc <= 15) return 3.0;
  if(acc <= 25) return 4.5;
  return 6.0;
}

function smoothSpeed(newSpeed, acc){
  const threshold = getSpeedThresholdByAccuracy(acc);

  // đứng yên hoặc GPS chưa ổn thì ép về 0
  if(!Number.isFinite(newSpeed) || newSpeed < threshold){
    state.speedSamples.push(0);
  }else{
    state.speedSamples.push(newSpeed);
  }

  if(state.speedSamples.length > 6) state.speedSamples.shift();

  const avg = state.speedSamples.reduce((a,b)=>a+b,0) / state.speedSamples.length;

  // thêm một lớp chặn rung rất nhỏ
  if(avg < threshold * 0.9) return 0;

  return avg;
}

function applyModeLayout(){
  if(mode === 'race'){
    document.getElementById('map').classList.add('race-hidden');
  }else{
    document.getElementById('map').classList.remove('race-hidden');
  }
}

async function fetchCurrentTemperature(lat, lng){
  try{
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code&timezone=auto`;
    const res = await fetch(url);
    const data = await res.json();
    if(data && data.current){
      state.temperature = data.current.temperature_2m;
      state.weatherText = `Nhiệt độ hiện tại`;
      draw();
    }
  }catch(err){
    state.weatherText = 'Không tải được nhiệt độ';
    draw();
  }
}

function startTempUpdates(){
  if(tempTimer) clearInterval(tempTimer);
  fetchCurrentTemperature(state.lat, state.lng);
  tempTimer = setInterval(() => {
    if(state.locationOk) fetchCurrentTemperature(state.lat, state.lng);
  }, 300000);
}

function autoGear(speed){
  let g = 1;
  if(speed > 25) g = 2;
  if(speed > 50) g = 3;
  if(speed > 85) g = 4;
  if(speed > 125) g = 5;
  if(speed > 170) g = 6;
  return g;
}

function calcRpm(speed, gear){
  const base = 1800 + speed * 55;
  const gearAdjust = Math.max(0, (7 - gear) * 250);
  return clamp(base + gearAdjust + Math.sin(Date.now()/220)*220, 1200, 15500);
}

function startGps(){
  if(!navigator.geolocation){
    setToast('Thiết bị này không hỗ trợ GPS trên trình duyệt.');
    return;
  }
  if(watchId !== null) navigator.geolocation.clearWatch(watchId);

  gpsBtn.textContent = 'Đang chạy GPS';
  setToast('Đang xin quyền vị trí...');

  watchId = navigator.geolocation.watchPosition(pos => {
    const { latitude, longitude, speed, heading, accuracy } = pos.coords;
    const ts = pos.timestamp || Date.now();

    let computed = 0;
    if(typeof speed === 'number' && !Number.isNaN(speed)){
      computed = speed * 3.6;
    }else if(state.lastLat !== null && state.lastTimestamp !== null){
      const km = haversineKm(state.lastLat, state.lastLng, latitude, longitude);
      const hours = (ts - state.lastTimestamp) / 3600000;
      if(hours > 0) computed = km / hours;
    }

    state.lat = latitude;
    state.lng = longitude;
    state.rawSpeedKmh = clamp(computed, 0, 299);
    state.speedKmh = clamp(smoothSpeed(state.rawSpeedKmh, accuracy), 0, 299);
    state.heading = (typeof heading === 'number' && !Number.isNaN(heading)) ? heading : state.heading;
    state.accuracy = accuracy;
    state.locationOk = true;
    state.lastTimestamp = ts;
    state.lastLat = latitude;
    state.lastLng = longitude;
    state.sats = accuracy ? Math.max(4, Math.min(14, Math.round(15 - accuracy / 10))) : 9;
    state.gear = autoGear(state.speedKmh);
    state.rpm = calcRpm(state.speedKmh, state.gear);

    marker.setLatLng([latitude, longitude]);
    accuracyCircle.setLatLng([latitude, longitude]).setRadius(accuracy || 0);
    track.push([latitude, longitude]);
    if(track.length > 140) track.shift();
    routeLine.setLatLngs(track);

    if(follow) map.setView([latitude, longitude], Math.max(map.getZoom(), 16), { animate:true });

    setToast('');
    draw();
  }, err => {
    const msg = {
      1: 'Bạn đã từ chối quyền vị trí.',
      2: 'Không lấy được vị trí hiện tại.',
      3: 'Hết thời gian chờ GPS.'
    }[err.code] || ('Lỗi GPS: ' + err.message);
    setToast(msg);
    gpsBtn.textContent = 'Bật GPS';
  }, {
    enableHighAccuracy: true,
    maximumAge: 1000,
    timeout: 15000
  });

  startTempUpdates();
}

gpsBtn.onclick = startGps;
modeBtn.onclick = () => {
  mode = mode === 'touring' ? 'race' : 'touring';
  modeBtn.textContent = mode === 'touring' ? 'Touring' : 'Race';
  applyModeLayout();
  draw();
};
themeBtn.onclick = () => {
  document.body.classList.toggle('day');
  themeBtn.textContent = document.body.classList.contains('day') ? 'Day' : 'Night';
  draw();
};
followBtn.onclick = () => {
  follow = !follow;
  followBtn.textContent = follow ? 'Follow' : 'Free';
};

bikeThemeBtn.onclick = () => {
  const order = ['ducati', 'r1', 'zx10r'];
  const idx = order.indexOf(state.bikeTheme);
  state.bikeTheme = order[(idx + 1) % order.length];
  bikeThemeBtn.textContent = state.bikeTheme.toUpperCase();
  draw();
};

lapBtn.onclick = () => {
  const now = performance.now();
  if(state.lapStart === null){
    state.lapStart = now;
    state.lapCurrentMs = 0;
    state.lapLastMs = null;
    lapBtn.textContent = 'Lap 1';
  }else{
    const lap = now - state.lapStart;
    state.lapLastMs = lap;
    state.lapBestMs = state.lapBestMs == null ? lap : Math.min(state.lapBestMs, lap);
    state.lapStart = now;
    state.lapCurrentMs = 0;
    lapBtn.textContent = 'Lap+';
  }
  draw();
};

function rr(x,y,w,h,r,fill=true){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  if(fill) ctx.fill();
}
function line(x1,y1,x2,y2,w,color){
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.lineWidth = w;
  ctx.strokeStyle = color;
  ctx.stroke();
}
function palette(){
  const day = document.body.classList.contains('day');
  if(day){
    return { text:'#102231', sub:'#607b90', panel:'rgba(240,246,251,.80)', panel2:'rgba(224,236,246,.88)', accent:'#0b84ff', ok:'#1ca154', amber:'#c98600', danger:'#df5b5b' };
  }
  return { text:'#eef8ff', sub:'#97aec2', panel:'rgba(10,18,28,.70)', panel2:'rgba(8,14,22,.82)', accent:'#35b6ff', ok:'#49d47c', amber:'#ffc857', danger:'#ff6e6e' };
}

function bikeThemeColors(){
  const themes = {
    ducati: {
      bg: '#000000', speed: '#ffffff', gear: '#ff3b30', green: '#00ff88', amber: '#ffaa00', red: '#ff2222', accent: '#ff3b30', sub: '#cfcfcf'
    },
    r1: {
      bg: '#020814', speed: '#f5fbff', gear: '#2ea8ff', green: '#00ff99', amber: '#ffd34d', red: '#ff4d4d', accent: '#2ea8ff', sub: '#c9d8e6'
    },
    zx10r: {
      bg: '#020b03', speed: '#f2fff3', gear: '#5dff6f', green: '#5dff6f', amber: '#d6ff38', red: '#ff5a5a', accent: '#5dff6f', sub: '#cadcca'
    }
  };
  return themes[state.bikeTheme] || themes.ducati;
}

function formatMs(ms){
  if(ms == null) return '--:--.---';
  const total = Math.max(0, Math.floor(ms));
  const m = Math.floor(total / 60000);
  const s = Math.floor((total % 60000) / 1000);
  const mm = total % 1000;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(mm).padStart(3,'0')}`;
}

function drawTopBadges(c){
  const arr = [
    {x:18, label:'GPS', bg:state.locationOk ? c.ok : c.danger},
    {x:66, label:'ABS', bg:c.amber},
    {x:120, label:'N', bg:c.ok},
  ];
  arr.forEach(it=>{
    ctx.fillStyle = it.bg;
    rr(it.x,18,it.label==='ABS'?42:34,18,8,true);
    ctx.fillStyle = '#081018';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(it.label, it.x + (it.label==='ABS'?21:17), 30);
  });
}

function drawCommonFooter(c){
  ctx.fillStyle = c.panel2;
  rr(14,440,772,26,10,true);
  ctx.fillStyle = c.sub;
  ctx.font = '12px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`LAT ${state.lat.toFixed(6)} • LNG ${state.lng.toFixed(6)} • ACC ${state.accuracy ? Math.round(state.accuracy) + 'm' : '--'}`, 28, 457);
  ctx.textAlign = 'right';
  ctx.fillText(`${state.temperature ?? '--'}°C`, 770, 457);
}

function drawTouring(c){
  ctx.fillStyle = c.panel;
  rr(522,56,260,336,22,true);

  ctx.fillStyle = c.panel2;
  rr(542,74,220,128,18,true);
  ctx.fillStyle = c.text;
  ctx.font = '900 90px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(String(Math.round(state.speedKmh)), 652, 152);
  ctx.fillStyle = c.sub;
  ctx.font = 'bold 18px Arial';
  ctx.fillText('km/h', 652, 180);

  ctx.fillStyle = c.panel2;
  rr(542,216,220,74,16,true);
  ctx.fillStyle = c.sub;
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Nhiệt độ', 558, 242);
  ctx.fillStyle = c.text;
  ctx.font = 'bold 30px Arial';
  ctx.fillText(`${state.temperature ?? '--'}°C`, 558, 275);

  const stats = [
    ['GPS', (state.sats || 0) + ' sat', (state.sats || 0) >= 8 ? c.ok : c.amber],
    ['ODO', '12580 km', c.text],
    ['HEAD', Math.round(state.heading || 0) + '°', c.text],
    ['MODE', 'TOUR', c.accent]
  ];

  for(let i=0;i<4;i++){
    const x = 542 + (i%2)*112;
    const y = 304 + Math.floor(i/2)*46;
    ctx.fillStyle = c.panel2;
    rr(x,y,106,38,12,true);
    ctx.fillStyle = c.sub;
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(stats[i][0], x+10, y+14);
    ctx.textAlign = 'right';
    ctx.fillStyle = stats[i][2];
    ctx.font = 'bold 14px Arial';
    ctx.fillText(stats[i][1], x+94, y+26);
  }

  ctx.save();
  ctx.translate(498,82);
  ctx.rotate((state.heading || 0) * Math.PI / 180);
  ctx.fillStyle = c.accent;
  ctx.beginPath();
  ctx.moveTo(0,-16); ctx.lineTo(10,12); ctx.lineTo(0,7); ctx.lineTo(-10,12); ctx.closePath();
  ctx.shadowColor = c.accent;
  ctx.shadowBlur = 12;
  ctx.fill();
  ctx.restore();
}

function drawShiftLights(c){
  const thresholds = [7000,8000,9000,10000,11000,12000,13000,14000];
  const startX = 180, y = 54, w = 34, gap = 8;
  thresholds.forEach((th, i) => {
    let color = c.panel2;
    if(state.rpm >= th){
      if(i < 4) color = c.ok;
      else if(i < 6) color = c.amber;
      else color = c.danger;
    }
    ctx.fillStyle = color;
    rr(startX + i*(w+gap), y, w, 16, 6, true);
  });
}

function drawRace(c){
  const t = bikeThemeColors();
  const overspeed = state.speedKmh >= 120;
  const hot = state.rpm >= 12000;

  if(overspeed){
    state.overspeedShake = Math.min(state.overspeedShake + 0.18, 1);
  }else{
    state.overspeedShake = Math.max(state.overspeedShake - 0.12, 0);
  }

  const shakeX = overspeed ? Math.sin(Date.now()/28) * 5 * state.overspeedShake : 0;
  const shakeY = overspeed ? Math.cos(Date.now()/36) * 3 * state.overspeedShake : 0;

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // nền full đen kiểu race
  ctx.fillStyle = t.bg;
  ctx.fillRect(-10,-10,840,520);

  // viền trên / shift light bar
  const maxBars = 20;
  const activeBars = Math.floor((state.rpm / 16000) * maxBars);
  for(let i=0;i<maxBars;i++){
    let color = '#1a1a1a';
    if(i < activeBars){
      if(i < 10) color = t.green;
      else if(i < 16) color = t.amber;
      else color = t.red;
    }
    if(hot && i >= 16){
      color = (Math.floor(Date.now()/90) % 2 === 0) ? '#ffffff' : t.red;
    }
    ctx.fillStyle = color;
    rr(18 + i*38, 18, 30, 14, 4, true);
  }

  // track mode badge
  ctx.fillStyle = overspeed ? t.red : t.accent;
  rr(20, 48, 118, 28, 12, true);
  ctx.fillStyle = '#081018';
  ctx.font = '900 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('TRACK MODE', 79, 67);

  // lap timing panel
  ctx.fillStyle = '#101010';
  rr(560, 46, 220, 84, 14, true);
  ctx.fillStyle = t.sub;
  ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('CURRENT', 576, 70);
  ctx.fillText('BEST', 576, 96);
  ctx.fillText('LAST', 576, 122);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Arial';
  ctx.fillText(formatMs(state.lapCurrentMs), 764, 70);
  ctx.fillText(formatMs(state.lapBestMs), 764, 96);
  ctx.fillText(formatMs(state.lapLastMs), 764, 122);

  // gear trái
  ctx.fillStyle = t.accent;
  ctx.font = '900 128px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(String(state.gear), 34, 188);

  ctx.fillStyle = t.sub;
  ctx.font = 'bold 20px Arial';
  ctx.fillText('GEAR', 42, 212);

  // tốc độ giữa
  ctx.fillStyle = t.speed;
  ctx.font = '900 170px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(String(Math.round(state.speedKmh)), 400, 268);

  ctx.fillStyle = t.sub;
  ctx.font = 'bold 30px Arial';
  ctx.fillText('km/h', 400, 312);

  // rpm nhỏ góc phải
  ctx.textAlign = 'right';
  ctx.fillStyle = hot ? t.red : t.speed;
  ctx.font = 'bold 34px Arial';
  ctx.fillText((state.rpm/1000).toFixed(1) + 'k', 780, 178);

  // overspeed warning
  if(overspeed){
    const flashOn = Math.floor(Date.now()/120) % 2 === 0;
    ctx.fillStyle = flashOn ? t.red : '#ffffff';
    rr(300, 330, 200, 38, 16, true);
    ctx.fillStyle = flashOn ? '#fff' : '#111';
    ctx.font = '900 22px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('OVERSPEED', 400, 356);
  }

  // bottom info strip
  ctx.fillStyle = '#0e0e0e';
  rr(18, 392, 764, 72, 18, true);

  const items = [
    ['TEMP', `${state.temperature ?? '--'}°C`, t.speed],
    ['GPS', `${state.sats || 0} sat`, t.speed],
    ['HEAD', `${Math.round(state.heading || 0)}°`, t.speed],
    ['THEME', state.bikeTheme.toUpperCase(), t.accent],
  ];

  items.forEach((item, i) => {
    const x = 34 + i*188;
    ctx.fillStyle = t.sub;
    ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(item[0], x, 416);
    ctx.fillStyle = item[2];
    ctx.font = 'bold 26px Arial';
    ctx.fillText(item[1], x, 446);
  });

  ctx.restore();
}

function draw(){
  state.gear = autoGear(state.speedKmh);
  state.rpm = calcRpm(state.speedKmh, state.gear);

  if(state.lapStart !== null){
    state.lapCurrentMs = performance.now() - state.lapStart;
  }

  ctx.clearRect(0,0,800,480);
  const c = palette();
  if(mode === 'touring'){
    drawTopBadges(c);
    drawTouring(c);
    drawCommonFooter(c);
  }else{
    drawRace(c);
  }
}

setToast('');
wireHudActivity();
showHudTemporarily(8000);
draw();
</script>
