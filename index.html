<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Đo size nhẫn</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Arial;
  background:#f4f4f4;
}

.app{
  max-width:420px;
  margin:auto;
  background:#fff;
  min-height:100vh;
  padding:16px;
}

.option{
  border:2px solid #ddd;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  cursor:pointer;
}
.option.active{
  border-color:#0b57d0;
}

.cal-box{
  height:65vh;
  border:1px solid #ddd;
  margin-top:15px;
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

.cal-object{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:70px;
  height:150px;
  border:3px solid #0b57d0;
  border-radius:10px;
}

.slider{
  margin-top:15px;
}

.measure-area{
  height:230px;
  border:1px solid #ddd;
  margin-top:10px;
  position:relative;
}

.line{
  position:absolute;
  width:100%;
  height:4px;
  background:#0b57d0;
}

.line.top{
  top:calc(50% - var(--gap)/2);
}
.line.bottom{
  top:calc(50% + var(--gap)/2);
}

.btn{
  margin-top:15px;
  padding:14px;
  width:100%;
  border:none;
  background:#111;
  color:#fff;
  border-radius:10px;
}

.hidden{display:none}

.rotate{
  position:fixed;
  inset:0;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  z-index:9999;
}

</style>
</head>

<body>

<div class="rotate hidden" id="rotate">
XOAY DỌC MÀN HÌNH
</div>

<div class="app">

<h2>Đo size nhẫn</h2>

<!-- STEP 1 -->
<div id="step1">

<div class="option" data-mm="53.98">CCCD (53.98mm)</div>
<div class="option" data-mm="65">20.000đ (65mm)</div>

<div class="cal-box" id="calBox">
<div class="cal-object" id="calObject"></div>
</div>

<input type="range" id="calSlider" min="80" max="300" value="150" class="slider">

<button class="btn" id="confirm">Xác nhận</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">

<div class="measure-area" id="measure">
<div class="line top"></div>
<div class="line bottom"></div>
</div>

<input type="range" id="finger" min="10" max="25" step="0.01" value="14" class="slider">

<button class="btn" id="reset">Calibrate lại</button>

</div>

</div>

<script>

let state={
 mmPerPx:0,
 ref:0,
 snapshot:null
}

const calObject=document.getElementById("calObject")
const calSlider=document.getElementById("calSlider")
const finger=document.getElementById("finger")
const measure=document.getElementById("measure")

// chọn vật
document.querySelectorAll(".option").forEach(el=>{
 el.onclick=()=>{
  document.querySelectorAll(".option").forEach(x=>x.classList.remove("active"))
  el.classList.add("active")
  state.ref=parseFloat(el.dataset.mm)
 }
})

// kéo calibrate
calSlider.oninput=()=>{
 calObject.style.height=calSlider.value+"px"
}

// xác nhận
document.getElementById("confirm").onclick=()=>{
 if(!state.ref) return alert("Chọn vật chuẩn")

 state.mmPerPx=state.ref / calSlider.value

 lockScreen()

 document.getElementById("step1").classList.add("hidden")
 document.getElementById("step2").classList.remove("hidden")
}

// đo ngón
finger.oninput=()=>{
 let mm=finger.value
 let px=mm/state.mmPerPx
 measure.style.setProperty("--gap",px+"px")
}

// reset
document.getElementById("reset").onclick=()=>{
 location.reload()
}

// 🔒 khóa màn hình
function snapshot(){
 return {
  w:innerWidth,
  h:innerHeight,
  dpr:devicePixelRatio
 }
}

function lockScreen(){
 state.snapshot=snapshot()
}

// theo dõi thay đổi
function watch(){
 let cur=snapshot()
 if(state.snapshot &&
  (cur.w!==state.snapshot.w ||
   cur.h!==state.snapshot.h ||
   cur.dpr!==state.snapshot.dpr)){
    alert("Thay đổi màn hình → calibrate lại")
    location.reload()
 }
}

setInterval(watch,800)

// chặn xoay
function checkRotate(){
 let r=document.getElementById("rotate")
 if(innerWidth>innerHeight){
   r.classList.remove("hidden")
 }else{
   r.classList.add("hidden")
 }
}
window.onresize=checkRotate
checkRotate()

</script>

</body>
</html>
